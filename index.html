<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nutrisystem Tips & Weight Loss Guide | TheCreatorVault</title>
<meta name="description" content="Daily Nutrisystem tips, weight loss strategies, and healthy living advice. Start your journey today.">

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f7f7f7;
    color: #222;
}
header {
    background: #111;
    color: white;
    padding: 20px;
    text-align: center;
}
.hero {
    padding: 40px 20px;
    text-align: center;
    background: #fff;
}
.hero h1 {
    font-size: 32px;
}
.cta {
    display: inline-block;
    margin-top: 20px;
    padding: 15px 25px;
    background: #ff5a5f;
    color: white;
    text-decoration: none;
    font-weight: bold;
    border-radius: 6px;
}
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
.post {
    background: white;
    margin-bottom: 20px;
    padding: 20px;
    border-radius: 8px;
}
.post img {
    width: 100%;
    border-radius: 6px;
}
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    color: white;
}
</style>
</head>

<body>

<header>
    <h2>TheCreatorVault</h2>
</header>

<section class="hero">
    <h1>Daily Nutrisystem Tips for Faster Weight Loss</h1>
    <p>Simple strategies, real results, and proven tips updated daily.</p>

    <a class="cta" href="https://convert.ctypy.com/aff_c?offer_id=29197&aff_id=21885" target="_blank">
        Start Nutrisystem Now →
    </a>
</section>

<div class="container">

    <h2>🔥 Today’s Featured Tip</h2>

    <div class="post" id="featured-post">
        Loading...
    </div>

    <h2>📅 More Daily Tips</h2>

    <div id="posts"></div>

</div>

<footer>
    © 2026 TheCreatorVault — All Rights Reserved
</footer>

<script>
const affiliateLink = "https://convert.ctypy.com/aff_c?offer_id=29197&aff_id=21885";

// 🔥 LOAD REAL POSTS FROM posts.json
fetch("posts.json")
  .then(res => res.json())
  .then(posts => {

    // ✅ Featured post
    const featured = posts[0];
    document.getElementById("featured-post").innerHTML = `
        <h3>
          <a href="#${featured.title.replace(/\\s+/g,'-').toLowerCase()}">
            ${featured.title}
          </a>
        </h3>
        <img src="${featured.image}">
        <p>${featured.tip}</p>
        <a class="cta" href="${affiliateLink}" target="_blank">Start Now</a>
    `;

    // ✅ Load all posts
    const container = document.getElementById("posts");

    posts.slice(1).forEach(post => {
        const el = document.createElement("div");

        // 🔥 SEO BOOST (anchor IDs)
        el.className = "post";
        el.id = post.title.replace(/\\s+/g,'-').toLowerCase();

        el.innerHTML = `
            <h3>
              <a href="#${post.title.replace(/\\s+/g,'-').toLowerCase()}">
                ${post.title}
              </a>
            </h3>
            <img src="${post.image}">
            <p>${post.tip}</p>
            <a class="cta" href="${affiliateLink}" target="_blank">Try Nutrisystem</a>
        `;

        container.appendChild(el);
    });

  })
  .catch(err => {
    document.getElementById("featured-post").innerHTML = "Error loading posts.";
    console.error(err);
  });
</script>

</body>
</html>
